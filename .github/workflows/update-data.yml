name: Обновление данных LM.inc

on:
  schedule:
    # Каждые 15 минут. При желании можно изменить (минимум для GitHub Actions — 5 минут,
    # но частые запуски могут выполняться с задержкой на бесплатном тарифе).
    - cron: "*/15 * * * *"
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Обновить data.json
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/update-data.mjs

      - name: Закоммитить изменения (если есть)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json history/
          if git diff --cached --quiet; then
            echo "Нет изменений"
          else
            git commit -m "chore: автообновление data.json и истории"
            git push
          fi
